openapi: 3.0.3
info:
  title: LiveClass Weekly Study Planner API
  description: |
    LiveClass 학습 플래너 기능을 위한 Mock API 명세서입니다.

    ## 주요 기능
    - 강의 목록 조회
    - 특정 주차 플래너 조회
    - 특정 주차 draft 조회 및 저장
    - 특정 주차 플래너 일괄 저장

    ## 설계 원칙
    - 시간 값은 HH:mm 문자열로 송수신합니다.
    - 시간 선택 및 저장 단위는 30분 간격을 기본으로 합니다.
    - 주간 요약(summary)은 서버 책임으로 계산하여 응답에 포함합니다.
    - 저장 전 편집 상태는 planner draft API로 별도 관리합니다.
  version: 0.1.0

servers:
  - url: http://localhost:3000/api
    description: Local mock server

tags:
  - name: courses
    description: 강의 목록 API
  - name: planner
    description: 주간 플래너 API
  - name: planner-draft
    description: 주간 플래너 draft API

paths:
  /courses:
    get:
      tags: [courses]
      summary: 강의 목록 조회
      description: 플래너에서 선택 가능한 강의 목록을 조회합니다.
      responses:
        '200':
          description: 강의 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'

  /planner:
    get:
      tags: [planner]
      summary: 주간 플래너 조회
      description: 특정 주차의 저장된 학습 블록과 요약 정보를 조회합니다. 클라이언트는 이전 주/다음 주 이동 시 이 API를 재호출합니다.
      parameters:
        - in: query
          name: weekStart
          required: true
          schema:
            type: string
            format: date
          description: 조회 대상 주의 월요일 날짜 (YYYY-MM-DD)
      responses:
        '200':
          description: 주간 플래너 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    put:
      tags: [planner]
      summary: 주간 플래너 저장
      description: 특정 주차의 편집 중 학습 블록 전체를 일괄 저장합니다. 저장 성공 시 서버에서 재계산한 summary를 함께 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePlannerRequest'
      responses:
        '200':
          description: 주간 플래너 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 시간 충돌 발생
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /planner/draft:
    get:
      tags: [planner-draft]
      summary: 주간 플래너 draft 조회
      description: 특정 주차에 저장된 편집 중 draft를 조회합니다. draft가 없으면 저장본을 대신 조회하지 않고 빈 응답을 반환합니다.
      parameters:
        - in: query
          name: weekStart
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: draft 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    put:
      tags: [planner-draft]
      summary: 주간 플래너 draft 저장
      description: 특정 주차의 편집 중 학습 블록 전체를 draft로 저장합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePlannerDraftRequest'
      responses:
        '200':
          description: draft 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 시간 충돌 발생
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [planner-draft]
      summary: 주간 플래너 draft 삭제
      description: 최종 저장 성공 후 특정 주차의 draft를 삭제합니다.
      parameters:
        - in: query
          name: weekStart
          required: true
          schema:
            type: string
            format: date
      responses:
        '204':
          description: draft 삭제 성공
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  schemas:
    Course:
      type: object
      required: [id, title, color]
      properties:
        id:
          type: string
        title:
          type: string
        color:
          type: string
          example: '#4A90D9'

    CourseListResponse:
      type: object
      required: [courses]
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/Course'

    StudyBlock:
      type: object
      required: [id, courseId, dayOfWeek, startTime, endTime]
      properties:
        id:
          type: string
        courseId:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: 0은 월요일, 6은 일요일
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '09:30'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '10:30'
        memo:
          type: string
          maxLength: 200

    CourseSummaryItem:
      type: object
      required: [courseId, totalMinutes]
      properties:
        courseId:
          type: string
        totalMinutes:
          type: integer

    DaySummaryItem:
      type: object
      required: [dayOfWeek, totalMinutes]
      properties:
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        totalMinutes:
          type: integer

    PlannerSummary:
      type: object
      required: [totalMinutes, byCourse, byDay]
      properties:
        totalMinutes:
          type: integer
        byCourse:
          type: array
          items:
            $ref: '#/components/schemas/CourseSummaryItem'
        byDay:
          type: array
          items:
            $ref: '#/components/schemas/DaySummaryItem'
        formattedTotal:
          type: string
          example: '7h 30m'

    PlannerResponse:
      type: object
      required: [weekStart, blocks, summary]
      properties:
        weekStart:
          type: string
          format: date
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/StudyBlock'
        summary:
          $ref: '#/components/schemas/PlannerSummary'

    PlannerDraftResponse:
      type: object
      required: [weekStart, blocks, updatedAt]
      properties:
        weekStart:
          type: string
          format: date
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/StudyBlock'
        updatedAt:
          type: string
          format: date-time

    SavePlannerBlock:
      type: object
      required: [courseId, dayOfWeek, startTime, endTime]
      properties:
        id:
          type: string
          description: 기존 블록일 경우 포함
        courseId:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '13:30'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '15:00'
        memo:
          type: string
          maxLength: 200

    SavePlannerRequest:
      type: object
      required: [weekStart, blocks]
      properties:
        weekStart:
          type: string
          format: date
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/SavePlannerBlock'

    SavePlannerDraftRequest:
      type: object
      required: [weekStart, blocks]
      properties:
        weekStart:
          type: string
          format: date
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/SavePlannerBlock'

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [TIME_CONFLICT, INVALID_TIME_RANGE, INVALID_BLOCK]
        message:
          type: string
        conflictBlockIds:
          type: array
          items:
            type: string
          description: TIME_CONFLICT 발생 시 충돌한 블록 ID 목록

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
